    <script id="rendered-js">
var currentList = [];  // 快取 20 項原始亂數
var historySteps = []; // 歷史影格集合：[{ array:[], compare:[], sorted:[], countArr:[] }]
var currentStepIdx = 0;
var currentMethodIdx = 1;

// 自動播放控制變數
var isPlaying = false;
var playTimer = null;

// 網頁開啟時自動初始化
window.onload = function() {
    generateNewList();
};

// 產生隨機不重複的 1~20 數列
function generateNewList() {
    pauseAnimation();
    currentList = [];
    while(currentList.length < 20){
        var r = Math.floor(Math.random() * 20) + 1;
        if(currentList.indexOf(r) === -1) currentList.push(r);
    }
    selectMethod(currentMethodIdx); // 重新洗牌後自動更新影格
}
function selectMethod(type) {
    pauseAnimation();
    currentMethodIdx = type;
    
    // 控制計數排序專用輔助面板的顯示與隱藏
    document.getElementById("counting-container").style.display = (type === 7) ? "block" : "none";

    for(var i=1; i<=9; i++) {
        var btn = document.getElementById("btn-"+i);
        if(btn) btn.classList.remove("active");
    }
    document.getElementById("btn-"+type).classList.add("active");

    var data = [...currentList];
    // 初始化歷史紀錄，第 0 步為原始亂數狀態
    historySteps = [{ array: [...data], compare: [], sorted: [], countArr: Array(21).fill(0) }];

    // ==========================================
    // 1. 氣泡排序 (最佳化旗標 Flag 版)
    // ==========================================
    if (type === 1) { 
        for (var i = 0; i < data.length - 1; i++) {
            var swapped = false; // 初始化旗標
            for (var j = 0; j < data.length - 1 - i; j++) {
                var finished = Array.from({length: i}, (_, k) => data.length - 1 - k);
                historySteps.push({ array: [...data], compare: [j, j+1], sorted: finished });
                
                if (data[j] > data[j + 1]) {
                    var t = data[j]; data[j] = data[j + 1]; data[j + 1] = t;
                    swapped = true; // 發生交換，旗標設為 true
                    historySteps.push({ array: [...data], compare: [j, j+1], sorted: finished });
                }
            }
            // 如果整輪都沒發生交換，代表已經提早排序完成，直接中斷外迴圈！
            if (!swapped) {
                break;
            }
        }
    } 
    // ==========================================
    // 2. 選擇排序
    // ==========================================
    else if (type === 2) { 
        for (var i = 0; i < data.length - 1; i++) {
            var m = i;
            for (var j = i + 1; j < data.length; j++) {
                historySteps.push({ array: [...data], compare: [j, m], sorted: Array.from({length: i}, (_, k) => k) });
                if (data[j] < data[m]) m = j;
            }
            if (m !== i) {
                var t = data[i]; data[i] = data[m]; data[m] = t;
                historySteps.push({ array: [...data], compare: [i, m], sorted: Array.from({length: i + 1}, (_, k) => k) });
            }
        }
    } 
    // ==========================================
    // 3. 插入排序
    // ==========================================
    else if (type === 3) { 
        for (var i = 1; i < data.length; i++) {
            var key = data[i], j = i - 1;
            while (j >= 0 && data[j] > key) {
                historySteps.push({ array: [...data], compare: [j, j+1], sorted: [] });
                data[j + 1] = data[j];
                j--;
            }
            data[j + 1] = key;
            historySteps.push({ array: [...data], compare: [j+1], sorted: [] });
        }
    }
     // ==========================================
    // 4. 快速排序 (三數取中位數 Median-of-Three 版)
    // ==========================================
    else if (type === 4) { 
        var qSorted = new Set();
        
        function qSort(low, high) {
            if (low <= high) {
                if (high - low >= 2) { // 元素大於等於三個才需要取中位數
                    var mid = Math.floor((low + high) / 2);
                    
                    // 影格快照：亮起最左、中點、最右，提示正在尋找中位數
                    historySteps.push({ array: [...data], compare: [low, mid, high], sorted: [...qSorted] });
                    
                    // 排列 low、mid、high 的數值，使其符合 data[low] <= data[mid] <= data[high]
                    if (data[low] > data[mid]) { var t = data[low]; data[low] = data[mid]; data[mid] = t; }
                    if (data[low] > data[high]) { var t = data[low]; data[low] = data[high]; data[high] = t; }
                    if (data[mid] > data[high]) { var t = data[mid]; data[mid] = data[high]; data[high] = t; }
                    
                    // 中位數此時在 mid 的位置，將其與 high 位置進行交換，作為基準點 (Pivot)
                    var t = data[mid]; data[mid] = data[high]; data[high] = t;
                    
                    // 影格快照：展示中位數已經換到最右側 high
                    historySteps.push({ array: [...data], compare: [mid, high], sorted: [...qSorted] });
                }
                
                var pivot = data[high];
                var i = low - 1;
                
                // 開始標準的 Lomuto 切分法
                for (var j = low; j < high; j++) {
                    historySteps.push({ array: [...data], compare: [j, high], sorted: [...qSorted] });
                    if (data[j] < pivot) {
                        i++;
                        var t = data[i]; data[i] = data[j]; data[j] = t;
                        historySteps.push({ array: [...data], compare: [i, j], sorted: [...qSorted] });
                    }
                }
                
                var t2 = data[i + 1]; data[i + 1] = data[high]; data[high] = t2;
                qSorted.add(i + 1); // 基準點確定歸位
                historySteps.push({ array: [...data], compare: [i + 1, high], sorted: [...qSorted] });
                
                qSort(low, i);
                qSort(i + 2, high);
            }
        }
        qSort(0, data.length - 1);
    } 
    // ==========================================
    // 5. 合併排序 (全局最後大歸併才亮綠色)
    // ==========================================
    else if (type === 5) { 
        function merge(l, mid, r) {
            var left = data.slice(l, mid + 1);
            var right = data.slice(mid + 1, r + 1);
            var i = 0, j = 0, k = l;
            var isFinalMerge = (l === 0 && r === data.length - 1);

            while (i < left.length && j < right.length) {
                historySteps.push({ array: [...data], compare: [k], sorted: isFinalMerge ? Array.from({length: k}, (_, idx) => idx) : [] });
                if (left[i] <= right[j]) { data[k] = left[i]; i++; }
                else { data[k] = right[j]; j++; }
                k++;
            }
            while (i < left.length) { 
                historySteps.push({ array: [...data], compare: [k], sorted: isFinalMerge ? Array.from({length: k}, (_, idx) => idx) : [] });
                data[k] = left[i]; i++; k++; 
            }
            while (j < right.length) { 
                historySteps.push({ array: [...data], compare: [k], sorted: isFinalMerge ? Array.from({length: k}, (_, idx) => idx) : [] });
                data[k] = right[j]; j++; k++; 
            }
            historySteps.push({ array: [...data], compare: [], sorted: isFinalMerge ? Array.from({length: r + 1}, (_, idx) => idx) : [] });
        }
        function divide(l, r) {
            if (l < r) {
                var mid = Math.floor((l + r) / 2);
                divide(l, mid); divide(mid + 1, r); merge(l, mid, r);
            }
        }
        divide(0, data.length - 1);
    } 
    // ==========================================
    // 6. 堆積排序 (100% 修正完整排序與變色版)
    // ==========================================
    else if (type === 6) { 
        var hSorted = new Set();
        
        // 核心：最大堆積調整函式
        function heapify(sz, idx) {
            var lg = idx;
            var l = 2 * idx + 1;
            var r = 2 * idx + 2;
            
            if (l < sz && data[l] > data[lg]) lg = l;
            if (r < sz && data[r] > data[lg]) lg = r;
            
            if (lg !== idx) {
                // 正確交換陣列內部的兩個數字
                var temp = data[idx]; 
                data[idx] = data[lg]; 
                data[lg] = temp;
                
                // 錄製交換影格，此時 idx 與 lg 正在交換（橘紅）
                historySteps.push({ array: [...data], compare: [idx, lg], sorted: [...hSorted] });
                
                // 遞迴調整被影響的子樹
                heapify(sz, lg);
            }
        }
        
        var n = data.length;
        
        // 步驟 A：建立最大堆積 (Build Max Heap)
        // 從最後一個非葉子節點開始往上調整
        for (var i = Math.floor(n / 2) - 1; i >= 0; i--) {
            heapify(n, i);
        }
        
        // 步驟 B：斷堆排序 (Extract elements from heap)
        // 每次將堆積頂端最大值（data[0]）換到末尾，並縮小堆積範圍
        for (var i = n - 1; i > 0; i--) {
            // 正確交換根節點與當前末尾節點
            var temp = data[0]; 
            data[0] = data[i]; 
            data[i] = temp;
            
            hSorted.add(i); // 當前末尾節點（最大值）已確定絕對位置，鎖定為綠色
            
            // 錄製斷堆交換影格
            historySteps.push({ array: [...data], compare: [0, i], sorted: [...hSorted] });
            
            // 重新調整根節點，維持剩餘元素的最大堆積結構
            heapify(i, 0);
        }
        
        hSorted.add(0); // 最後剩下的一根自然歸位
    }

    // ==========================================
    // 7. 計數排序 (帶二級看板快照)
    // ==========================================
    else if (type === 7) { 
        var maxVal = 20;
        var count = Array(maxVal + 1).fill(0);
        for (var i = 0; i < data.length; i++) {
            count[data[i]]++;
            historySteps.push({ array: [...data], compare: [i], sorted: [], countArr: [...count] });
        }
        var idx = 0;
        for (var i = 1; i <= maxVal; i++) {
            while (count[i] > 0) {
                data[idx] = i; count[i]--;
                var finished = Array.from({length: idx + 1}, (_, k) => k);
                historySteps.push({ array: [...data], compare: [idx], sorted: finished, countArr: [...count] });
                idx++;
            }
        }
    }
    // ==========================================
    // 8. 內省排序 (Introsort)
    // ==========================================
    else if (type === 8) { 
        var introSorted = new Set();
        function introsortUtil(low, high, depthLimit) {
            var size = high - low + 1;
            if (size < 2) return;
            if (depthLimit === 0) { 
                for (var i = low; i <= high; i++) {
                    for (var j = low; j < high - (i - low); j++) {
                        if (data[j] > data[j+1]) {
                            var t = data[j]; data[j] = data[j+1]; data[j+1] = t;
                            historySteps.push({ array: [...data], compare: [j, j+1], sorted: [...introSorted] });
                        }
                    }
                    introSorted.add(high - (i - low));
                }
                return;
            }
            var pivot = data[high], idx = low - 1;
            for (var j = low; j < high; j++) {
                historySteps.push({ array: [...data], compare: [j, high], sorted: [...introSorted] });
                if (data[j] < pivot) {
                    idx++; var t = data[idx]; data[idx] = data[j]; data[j] = t;
                    historySteps.push({ array: [...data], compare: [idx, j], sorted: [...introSorted] });
                }
            }
            var t2 = data[idx + 1]; data[idx + 1] = data[high]; data[high] = t2;
            introSorted.add(idx + 1);
            historySteps.push({ array: [...data], compare: [idx+1, high], sorted: [...introSorted] });
            introsortUtil(low, idx, depthLimit - 1);
            introsortUtil(idx + 2, high, depthLimit - 1);
        }
        introsortUtil(0, data.length - 1, Math.floor(Math.log(data.length) * 2));
    }
    // ==========================================
    // 9. TimSort (最後大合併才亮綠色)
    // ==========================================
    else if (type === 9) { 
        var RUN = 5;
        for (var i = 0; i < data.length; i += RUN) {
            var end = Math.min(i + RUN - 1, data.length - 1);
            for (var m = i + 1; m <= end; m++) {
                var key = data[m], n = m - 1;
                while (n >= i && data[n] > key) {
                    historySteps.push({ array: [...data], compare: [n, n+1], sorted: [] });
                    data[n + 1] = data[n]; n--;
                }
                data[n + 1] = key;
            }
        }
        for (var size = RUN; size < data.length; size = 2 * size) {
            for (var left = 0; left < data.length; left += 2 * size) {
                var mid = left + size - 1, right = Math.min((left + 2 * size - 1), (data.length - 1));
                if (mid < right) {
                    var isFinal = (left === 0 && right === data.length - 1); 
                    var lArr = data.slice(left, mid + 1), rArr = data.slice(mid + 1, right + 1);
                    var lIdx = 0, rIdx = 0, kIdx = left;
                    while (lIdx < lArr.length && rIdx < rArr.length) {
                        historySteps.push({ array: [...data], compare: [kIdx], sorted: isFinal ? Array.from({length: kIdx}, (_, idx) => idx) : [] });
                        if (lArr[lIdx] <= rArr[rIdx]) { data[kIdx] = lArr[lIdx]; lIdx++; }
                        else { data[kIdx] = rArr[rIdx]; rIdx++; }
                        kIdx++;
                    }
                    while (lIdx < lArr.length) { data[kIdx] = lArr[lIdx]; lIdx++; kIdx++; }
                    while (rIdx < rArr.length) { data[kIdx] = rArr[rIdx]; rIdx++; kIdx++; }
                }
            }
        }
    }

    // 全局追加最終全綠影格
    historySteps.push({ array: [...data], compare: [], sorted: Array.from({length: 20}, (_, k) => k) });

    var slider = document.getElementById("progress-slider");
    slider.max = historySteps.length - 1;
    slider.value = 0;
    jumpToStep(0);
}
// ==========================================
// 區塊三：介面跳轉、播放計時器與 DOM 畫布渲染
// ==========================================

// 1. 控制滑桿手動或自動跳轉至第 k 步影格
function jumpToStep(idx) {
    currentStepIdx = parseInt(idx);
    document.getElementById("progress-slider").value = currentStepIdx;
    
    var step = historySteps[currentStepIdx];
    renderChart(step.array, step.compare, step.sorted);
    
    // 若目前為計數排序，同步重新繪製二級輔助統計看板
    if (currentMethodIdx === 7 && step.countArr) {
        renderCountingChart(step.countArr);
    }
    
    document.getElementById("step-counter").innerText = currentStepIdx + " / " + (historySteps.length - 1) + " 步";
    if (currentStepIdx === historySteps.length - 1) {
        document.getElementById("status-text").innerText = "💚 排序大功告成！所有元素已確認絕對位置並完全歸位。";
        pauseAnimation();
    } else if (currentStepIdx === 0) {
        document.getElementById("status-text").innerText = "數列初始化完成，請點擊播放或拖曳進度滑桿。";
    } else {
        document.getElementById("status-text").innerText = "分解演示中... 只有當元素確認在最終排序的「絕對正確位置」時才會亮起綠色。";
    }
}

// 2. 輔助面板渲染器 (計數排序專用)
function renderCountingChart(countArr) {
    var cChart = document.getElementById("counting-chart");
    cChart.innerHTML = "";
    for (var i = 1; i <= 20; i++) {
        var cBar = document.createElement("div");
        cBar.className = "c-bar";
        cBar.style.height = (countArr[i] * 15 + 15) + "px";
        cBar.innerText = i + ":" + countArr[i];
        cChart.appendChild(cBar);
    }
}

// 3. 自動播放控制開關
function togglePlay() {
    if (isPlaying) { 
        pauseAnimation(); 
    } else { 
        playAnimation(); 
    }
}

function playAnimation() {
    if (currentStepIdx >= historySteps.length - 1) currentStepIdx = 0;
    isPlaying = true;
    document.getElementById("btn-play").innerText = "⏸️ 暫停";
    runTimer();
}

function pauseAnimation() {
    isPlaying = false;
    document.getElementById("btn-play").innerText = "▶️ 播放";
    if (playTimer) clearTimeout(playTimer);
}

// 4. 動態定時器循環
function runTimer() {
    if (!isPlaying) return;
    jumpToStep(currentStepIdx);
    
    if (currentStepIdx < historySteps.length - 1) {
        currentStepIdx++;
        // 將速度滑桿數值倒轉，越右邊毫秒數越小（速度越快）
        var speed = 305 - document.getElementById("speed-slider").value; 
        playTimer = setTimeout(runTimer, speed);
    } else {
        pauseAnimation();
    }
}

// 5. 主長條圖高速渲染器 (帶三色變色邏輯)
function renderChart(arr, compareArr, sortedArr) {
    var chart = document.getElementById("chart");
    chart.innerHTML = ""; 
    for (var i = 0; i < arr.length; i++) {
        var bar = document.createElement("div");
        bar.className = "bar";
        bar.style.height = (arr[i] * 14) + "px"; 

        if (compareArr.indexOf(i) !== -1) {
            bar.style.backgroundColor = "#ff5722"; // 正在比較或交換：橘紅
        } else if (sortedArr.indexOf(i) !== -1 || sortedArr.indexOf(String(i)) !== -1) {
            bar.style.backgroundColor = "#4caf50"; // 絕對位置歸位：綠色
        } else {
            bar.style.backgroundColor = "#00bcd4"; // 預設：青藍
        }

        var valTag = document.createElement("span");
        valTag.className = "bar-value";
        valTag.innerText = arr[i];
        bar.appendChild(valTag);
        chart.appendChild(bar);
    }
}
  </script>
